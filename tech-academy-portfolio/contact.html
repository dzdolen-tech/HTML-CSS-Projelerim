<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Instructor's required meta description format -->
    <meta name="description" content="Put here your web content about contacting Mehmet for inquiries and messages regarding The Pet Shop.">
    <title>Contact Us | The Pet Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <header>
        <h1>Contact Us</h1>
        <!-- Instructor's required blockquote element -->
        <blockquote>
            "Communication is the key that opens every door."
        </blockquote>
    </header>

    <main>
        <section>
            <h2>Get in Touch</h2>
            <p><strong>Email:</strong> <a href="mailto:mehmet@example.com">mehmet@example.com</a></p>
            <p><strong>Location:</strong> Toronto, Canada</p>
        </section>

        <hr>

        <section>
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" placeholder="Your Name" required><br><br>

                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" placeholder="Your Email" required><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="4" cols="30" required></textarea><br><br>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <hr>
        <p>&copy; 2026 The Pet Shop Website Assignment | Developed by Mehmet</p>
    </footer>

</body>
</html>
